name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System dependencies ──────────────────────────────────

      - name: Install deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install deps (Windows)
        if: matrix.platform == 'win'
        run: |
          vcpkg install curl:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      # ── Build C++ binary ─────────────────────────────────────

      - name: Build C++ binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Verify binary exists
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            ls -la build/sermon-verse-detector.exe
          else
            ls -la build/sermon-verse-detector
          fi

      # ── Build Electron app ───────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Whisper model (small.en — 487 MB)
        shell: bash
        run: |
          mkdir -p models
          curl -L -o models/ggml-small.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Run packaging regression test
        working-directory: app
        run: node test-packaging.js

      - name: Create .env file
        shell: bash
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          BIBLE_KEY_1: ${{ secrets.API_BIBLE_KEY_1 }}
          BIBLE_KEY_2: ${{ secrets.API_BIBLE_KEY_2 }}
        run: |
          printf "GROQ_API_KEY=%s\nAPI_BIBLE_KEY_1=%s\nAPI_BIBLE_KEY_2=%s\n" \
            "$GROQ_KEY" "$BIBLE_KEY_1" "$BIBLE_KEY_2" > .env
          echo ".env created ($(wc -l < .env) lines)"

      - name: Build Electron app
        working-directory: app
        run: npx vite build && npx electron-builder --${{ matrix.platform }} --publish never

      # ── Fix macOS code signing ──────────────────────────────
      # electron-builder's ad-hoc signing breaks the seal on Electron Framework.
      # Re-sign the entire .app with proper ad-hoc signature + hardened runtime.
      - name: Re-sign macOS app
        if: matrix.platform == 'mac'
        run: |
          # Use absolute paths to avoid cd breakage
          ROOT="$(pwd)"
          ENTITLEMENTS="$ROOT/app/build/entitlements.mac.plist"

          # Find the .app bundle
          APP=$(find "$ROOT/app/release" -name "*.app" -maxdepth 2 2>/dev/null | head -1)
          echo "Signing: $APP"
          [ -z "$APP" ] && { echo "ERROR: No .app found"; exit 1; }

          # 1. Sign all dylibs and shared objects
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.node" \) | while read f; do
            codesign --force --sign - --timestamp=none "$f" 2>/dev/null
          done

          # 2. Sign embedded binaries (detector + ffmpeg)
          codesign --force --sign - --timestamp=none --entitlements "$ENTITLEMENTS" \
            "$APP/Contents/Resources/bin/sermon-verse-detector" 2>/dev/null || true
          codesign --force --sign - --timestamp=none \
            "$APP/Contents/Resources/app.asar.unpacked/node_modules/ffmpeg-static/ffmpeg" 2>/dev/null || true

          # 3. Sign helper apps (bottom-up)
          find "$APP/Contents/Frameworks" -name "*.app" -print0 | while IFS= read -r -d '' helper; do
            codesign --force --sign - --timestamp=none --entitlements "$ENTITLEMENTS" "$helper"
          done

          # 4. Sign frameworks (bottom-up)
          find "$APP/Contents/Frameworks" -maxdepth 1 -name "*.framework" -print0 | while IFS= read -r -d '' fw; do
            codesign --force --sign - --timestamp=none "$fw"
          done

          # 5. Sign the main app last
          codesign --force --sign - --timestamp=none --entitlements "$ENTITLEMENTS" "$APP"

          # 6. Verify
          codesign --verify --deep --strict "$APP" 2>&1 && echo "Signing verified OK" || { echo "ERROR: Verification failed"; exit 1; }

          # 7. Rebuild DMG with the re-signed app (use absolute path)
          rm -f "$ROOT/app/release/"*.dmg
          cd "$ROOT/app" && npx electron-builder --mac dmg --publish never --prepackaged "$APP"

      # ── Upload artifacts ─────────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReactiveBible-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            app/release/*.dmg
            app/release/*.exe
            app/release/*.AppImage
            app/release/*.blockmap
            app/release/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # ── Release on PRIVATE repo (for your records) ───────────
      - name: Create private release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.blockmap

      # ── Release on PUBLIC repo (for download page + auto-update) ──
      - uses: actions/checkout@v4
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false
          path: source

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: gravity8/reactivebible-releases
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ReactiveBible ${{ github.ref_name }}
          body_path: source/RELEASE_NOTES.md
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.blockmap
