name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System dependencies ──────────────────────────────────

      - name: Install deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install deps (Windows)
        if: matrix.platform == 'win'
        run: |
          vcpkg install curl:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      # ── Build C++ binary ─────────────────────────────────────

      - name: Build C++ binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Verify binary exists
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            ls -la build/sermon-verse-detector.exe
          else
            ls -la build/sermon-verse-detector
          fi

      # ── Build Electron app ───────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Whisper model (small.en — 487 MB)
        shell: bash
        run: |
          mkdir -p models
          curl -L -o models/ggml-small.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Create .env file
        shell: bash
        run: |
          cat > .env <<'ENVEOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          API_BIBLE_KEY_1=${{ secrets.API_BIBLE_KEY_1 }}
          API_BIBLE_KEY_2=${{ secrets.API_BIBLE_KEY_2 }}
          ENVEOF
          # Strip leading whitespace from YAML indentation.
          sed -i.bak 's/^[[:space:]]*//' .env && rm -f .env.bak
          echo "--- .env contents ---"
          cat .env

      - name: Build Electron app
        working-directory: app
        run: npx vite build && npx electron-builder --${{ matrix.platform }} --publish never

      # ── Fix macOS code signing ──────────────────────────────
      # electron-builder's ad-hoc signing breaks the seal on Electron Framework.
      # Re-sign the entire .app with proper ad-hoc signature + hardened runtime.
      - name: Re-sign macOS app
        if: matrix.platform == 'mac'
        run: |
          APP=$(find app/release/mac-arm64 -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then
            APP=$(find app/release/mac -name "*.app" -maxdepth 1 | head -1)
          fi
          echo "Signing: $APP"

          # Sign all nested binaries first
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.node" \) -exec \
            codesign --force --sign - --timestamp=none {} \;

          # Sign frameworks
          find "$APP/Contents/Frameworks" -name "*.framework" -exec \
            codesign --force --deep --sign - --timestamp=none {} \;

          # Sign helper apps
          find "$APP/Contents/Frameworks" -name "*.app" -exec \
            codesign --force --deep --sign - --timestamp=none --entitlements /dev/null {} \;

          # Sign the detector binary and ffmpeg
          codesign --force --sign - --timestamp=none "$APP/Contents/Resources/bin/sermon-verse-detector" 2>/dev/null || true
          codesign --force --sign - --timestamp=none "$APP/Contents/Resources/app.asar.unpacked/node_modules/ffmpeg-static/ffmpeg" 2>/dev/null || true

          # Sign the main app
          codesign --force --deep --sign - --timestamp=none "$APP"

          # Verify
          codesign --verify --deep --strict "$APP" && echo "Signing verified OK"

          # Rebuild the DMG with the re-signed app
          npx electron-builder --mac dmg --publish never --prepackaged "$APP"

      # ── Upload artifacts ─────────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReactiveBible-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            app/release/*.dmg
            app/release/*.exe
            app/release/*.AppImage
            app/release/*.blockmap
            app/release/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # ── Release on PRIVATE repo (for your records) ───────────
      - name: Create private release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.blockmap

      # ── Release on PUBLIC repo (for download page + auto-update) ──
      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: gravity8/reactivebible-releases
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ReactiveBible ${{ github.ref_name }}
          body: |
            ## ReactiveBible ${{ github.ref_name }}

            Download for your platform below.
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.blockmap
