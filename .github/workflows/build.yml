name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
          - os: macos-13
            platform: mac
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System dependencies ──────────────────────────────────

      - name: Install deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install deps (Windows)
        if: matrix.platform == 'win'
        run: |
          vcpkg install curl:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      # ── Build C++ binary ─────────────────────────────────────

      - name: Build C++ binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Verify binary exists
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            ls -la build/sermon-verse-detector.exe
          else
            ls -la build/sermon-verse-detector
          fi

      # ── Build Electron app ───────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Whisper model (small.en — 487 MB)
        shell: bash
        run: |
          mkdir -p models
          curl -L -o models/ggml-small.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Create .env file
        shell: bash
        run: |
          cat > .env <<EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          API_BIBLE_KEY_1=${{ secrets.API_BIBLE_KEY_1 }}
          API_BIBLE_KEY_2=${{ secrets.API_BIBLE_KEY_2 }}
          EOF

      - name: Build Electron app
        working-directory: app
        run: npx vite build && npx electron-builder --${{ matrix.platform }} --publish never

      # ── Upload artifacts ─────────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReactiveBible-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            app/release/*.dmg
            app/release/*.exe
            app/release/*.AppImage
            app/release/*.blockmap
            app/release/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # ── Release on PRIVATE repo (for your records) ───────────
      - name: Create private release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage

      # ── Release on PUBLIC repo (for download page) ───────────
      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: gravity8/reactivebible-releases
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ReactiveBible ${{ github.ref_name }}
          body: |
            ## ReactiveBible ${{ github.ref_name }}

            Download for your platform below.
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
